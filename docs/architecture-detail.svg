    <circle cx="31" cy="31" r="12" class="icon"/>
    <path d="M31 19 V13 M31 49 V43 M19 31 H13 M49 31 H43" class="icon"/>
    <path d="M7 20 H1 M7 31 H1 M7 42 H1 M61 20 H55 M61 31 H55 M61 42 H55" class="icon"/>
