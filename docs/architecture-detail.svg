<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title id="title">Course Improvement Architecture Diagram</title>
  <desc id="desc">Vector recreation of the original architecture diagram with course, in-course recommendations, guided questions flow, and activity presets.</desc>
  <defs>
    <linearGradient id="leftBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ece4f7"/>
      <stop offset="68%" stop-color="#f4eaff"/>
      <stop offset="100%" stop-color="#fbf4ff"/>
    </linearGradient>
    <linearGradient id="middleBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f3f1"/>
      <stop offset="100%" stop-color="#e4f1ee"/>
    </linearGradient>
    <linearGradient id="rightBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce8df"/>
      <stop offset="100%" stop-color="#fbe7dd"/>
    </linearGradient>
    <linearGradient id="courseFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf6ff"/>
      <stop offset="100%" stop-color="#e5effe"/>
    </linearGradient>
    <linearGradient id="dbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#e9e9e9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <filter id="softShadow" x="-8%" y="-8%" width="125%" height="125%">
      <feOffset dx="3" dy="3" result="offset"/>
      <feFlood flood-color="#b67906" flood-opacity="0.35"/>
      <feComposite in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .text { font-family: Arimo, "Liberation Sans", Arial, Helvetica, sans-serif; fill: #111111; }
      .heading { font-size: 30px; font-weight: 700; }
      .course { font-size: 43px; font-weight: 700; fill: #0c4f9b; }
      .boxText { font-size: 18px; font-weight: 500; }
      .boxTextSmall { font-size: 14px; font-weight: 500; }
      .compactBoxText { font-size: 18px; font-weight: 500; }
      .tinyText { font-size: 14px; font-weight: 500; }
      .annotation { font-size: 16px; font-weight: 500; }
      .uiText { fill: #825600; }
      .columnPurple { fill: #5f35c4; }
      .columnTeal { fill: #08776f; }
      .columnOrange { fill: #c84a10; }
      .process { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .ui { fill: #fef1d6; stroke: #d58b00; stroke-width: 2.8; filter: url(#softShadow); }
      .db { fill: url(#dbFill); stroke: #333333; stroke-width: 2.1; }
      .line { stroke: #111111; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .lineNoArrow { stroke: #111111; stroke-width: 2.2; fill: none; }
      .double { stroke: #111111; stroke-width: 2.2; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .icon { stroke: #111111; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .uiIcon { stroke: #a16a00; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dbIcon { stroke: #6f6f6f; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dbDetail { stroke: #333333; stroke-width: 2.1; fill: none; }
      .dbText { font-size: 18px; font-weight: 500; }
      .labelBg { fill: #ffffff; opacity: 0.88; }
    </style>
  </defs>

  <rect x="0" y="0" width="514" height="1086" fill="url(#leftBg)"/>
  <rect x="514" y="0" width="471" height="1086" fill="url(#middleBg)"/>
  <rect x="985" y="0" width="463" height="1086" fill="url(#rightBg)"/>

  <text x="260" y="59" text-anchor="middle" class="text heading columnPurple">In-Course Recommendations</text>
  <text x="736" y="59" text-anchor="middle" class="text heading columnTeal">Guided Questions Flow</text>
  <text x="1233" y="59" text-anchor="middle" class="text heading columnOrange">Activity Presets</text>

  <rect x="36" y="87" width="1327" height="84" rx="12" fill="url(#courseFill)" stroke="#0a57c8" stroke-width="2.2"/>
  <g transform="translate(604 111)" stroke="#0c58ae" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 13 C17 6 27 6 38 13 V49 C27 43 17 43 6 49 Z"/>
    <path d="M38 13 C49 6 59 6 70 13 V49 C59 43 49 43 38 49 Z"/>
    <path d="M38 13 V49"/>
  </g>
