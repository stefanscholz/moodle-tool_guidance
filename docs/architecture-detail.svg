  <g transform="translate(112 257)">
    <path d="M4 46 H56" class="icon"/>
    <path d="M14 46 V30 M28 46 V18 M42 46 V26" class="icon"/>
    <path d="M9 21 L24 12 L37 20 L53 8" class="icon"/>
