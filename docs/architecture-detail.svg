  <text x="154" y="949" text-anchor="start" class="text boxText uiText">Recommendation</text>
  <text x="154" y="982" text-anchor="start" class="text boxText uiText">Block</text>

  <path d="M349 958 L655 958" class="line"/>
  <rect x="520" y="912" width="139" height="30" rx="6" class="labelBg"/>
