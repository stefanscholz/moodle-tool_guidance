      <circle cx="12" cy="8" r="4" fill="url(#dbFill)"/>
      <circle cx="26" cy="22" r="4" fill="url(#dbFill)"/>
      <circle cx="17" cy="36" r="4" fill="url(#dbFill)"/>
    </g>
    <text x="56" y="128" text-anchor="middle" class="text dbText">Rules</text>
