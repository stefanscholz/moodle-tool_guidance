  <path d="M724 563 L770 563" class="double"/>
  <path d="M826 657 L826 887" class="line"/>

  <rect x="655" y="887" width="307" height="138" rx="8" class="ui"/>
  <g transform="translate(681 919)">
    <path d="M0 8 Q0 0 8 0 H47 Q55 0 55 8 V30 Q55 38 47 38 H25 L14 49 V38 H8 Q0 38 0 30 Z" class="uiIcon"/>
    <path d="M20 14 C20 8 35 8 35 15 C35 21 28 22 28 27" class="uiIcon"/>
