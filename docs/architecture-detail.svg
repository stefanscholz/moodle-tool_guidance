  <text x="764" y="950" text-anchor="start" class="text boxText uiText">Guided Question</text>
  <text x="764" y="986" text-anchor="start" class="text boxText uiText">Flow UI</text>

  <!-- Activity Presets -->
  <rect x="1144" y="232" width="195" height="113" rx="8" class="process"/>
  <g transform="translate(1169 260)">
    <path d="M0 0 H33 L50 17 V65 H0 Z M33 0 V17 H50" class="icon"/>
    <path d="M14 29 H36 M14 41 H30" class="icon"/>
    <circle cx="50" cy="55" r="15" fill="#ffffff" stroke="#111111" stroke-width="2.5"/>
    <path d="M50 47 V63 M42 55 H58" class="icon"/>
  </g>
  <text x="1242" y="282" text-anchor="start" class="text compactBoxText">Preset</text>
  <text x="1242" y="314" text-anchor="start" class="text compactBoxText">Application</text>
  <path d="M1248 232 L1248 171" class="line"/>

