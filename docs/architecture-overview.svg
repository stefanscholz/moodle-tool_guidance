<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Simplified Course Improvement Architecture</title>
  <desc id="desc">A simplified architecture diagram showing Course, In-Course Recommendations, Guided Questions Flow, Activity Presets, and the main UI and runtime components.</desc>
  <defs>
    <linearGradient id="recommendationsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ece4f7"/>
      <stop offset="100%" stop-color="#f8efff"/>
    </linearGradient>
    <linearGradient id="flowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6f2f1"/>
      <stop offset="100%" stop-color="#e5f1ee"/>
    </linearGradient>
    <linearGradient id="presetsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce8df"/>
      <stop offset="100%" stop-color="#fbe7dd"/>
    </linearGradient>
    <linearGradient id="courseFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf5ff"/>
      <stop offset="100%" stop-color="#e6effd"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15171a"/>
    </marker>
    <filter id="uiShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feOffset dx="7" dy="7" result="offset"/>
      <feFlood flood-color="#c88a17" flood-opacity="0.65"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #20242a; }
      .column-title { font-size: 31px; font-weight: 700; }
      .recommendations-title { fill: #5f35c4; }
      .flow-title { fill: #087b72; }
      .presets-title { fill: #c84a10; }
      .course-title { font-size: 46px; font-weight: 700; fill: #0b4d9d; }
      .box-title { font-size: 27px; font-weight: 700; }
      .small { font-size: 20px; font-weight: 500; }
      .arrow { stroke: #15171a; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .arrow-light { stroke: #30333a; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
      .process { fill: #ffffff; stroke: #1b1d20; stroke-width: 2.5; }
      .ui { fill: #fef2d9; stroke: #dc9205; stroke-width: 3; filter: url(#uiShadow); }
      .label-bg { fill: #ffffff; opacity: 0.88; }
    </style>
  </defs>

  <rect x="0" y="0" width="535" height="900" fill="url(#recommendationsBg)"/>
  <rect x="535" y="0" width="530" height="900" fill="url(#flowBg)"/>
  <rect x="1065" y="0" width="535" height="900" fill="url(#presetsBg)"/>

  <text x="267" y="78" text-anchor="middle" class="label column-title recommendations-title">In-Course Recommendations</text>
  <text x="800" y="78" text-anchor="middle" class="label column-title flow-title">Guided Questions Flow</text>
  <text x="1332" y="78" text-anchor="middle" class="label column-title presets-title">Activity Presets</text>

  <rect x="80" y="116" width="1440" height="86" rx="16" fill="url(#courseFill)" stroke="#0a57c8" stroke-width="3"/>
  <text x="800" y="174" text-anchor="middle" class="label course-title">Course</text>

  <rect x="145" y="326" width="300" height="96" rx="12" class="process"/>
  <text x="295" y="365" text-anchor="middle" class="label box-title">Recommendation</text>
  <text x="295" y="398" text-anchor="middle" class="label box-title">Engine</text>

  <rect x="95" y="650" width="400" height="120" rx="14" class="ui"/>
  <text x="295" y="703" text-anchor="middle" class="label box-title">Recommendation</text>
  <text x="295" y="738" text-anchor="middle" class="label box-title">Block</text>

  <rect x="600" y="650" width="400" height="120" rx="14" class="ui"/>
  <text x="800" y="703" text-anchor="middle" class="label box-title">Guided Question</text>
  <text x="800" y="738" text-anchor="middle" class="label box-title">Flow UI</text>

  <rect x="1105" y="650" width="400" height="120" rx="14" class="ui"/>
  <text x="1305" y="703" text-anchor="middle" class="label box-title">Preset Application</text>
  <text x="1305" y="738" text-anchor="middle" class="label box-title">Dialog</text>

  <rect x="1155" y="315" width="300" height="96" rx="12" class="process"/>
  <text x="1305" y="354" text-anchor="middle" class="label box-title">Preset</text>
  <text x="1305" y="387" text-anchor="middle" class="label box-title">Application</text>

  <path d="M 295 202 L 295 326" class="arrow"/>
  <rect x="318" y="241" width="118" height="30" rx="6" class="label-bg"/>
  <text x="377" y="263" text-anchor="middle" class="label small">course data</text>

  <path d="M 295 422 L 295 650" class="arrow"/>
  <rect x="316" y="532" width="112" height="30" rx="6" class="label-bg"/>
  <text x="372" y="554" text-anchor="middle" class="label small">Suggestion</text>

  <path d="M 1000 710 L 1105 710" class="arrow"/>
  <rect x="855" y="607" width="196" height="30" rx="6" class="label-bg"/>
  <text x="953" y="629" text-anchor="middle" class="label small">selected preset</text>

  <path d="M 1305 650 L 1305 411" class="arrow"/>
  <rect x="1326" y="513" width="64" height="30" rx="6" class="label-bg"/>
  <text x="1358" y="535" text-anchor="middle" class="label small">apply</text>

  <path d="M 1305 315 L 1305 202" class="arrow"/>
  <rect x="1326" y="245" width="144" height="30" rx="6" class="label-bg"/>
  <text x="1398" y="267" text-anchor="middle" class="label small">adds activities</text>

  <path d="M 445 650 C 575 545, 610 365, 610 202" class="arrow-light"/>
  <rect x="520" y="462" width="126" height="54" rx="6" class="label-bg"/>
  <text x="583" y="485" text-anchor="middle" class="label small">apply</text>
  <text x="583" y="509" text-anchor="middle" class="label small">directly</text>

  <path d="M 495 695 C 565 600, 705 595, 755 650" class="arrow-light"/>
  <rect x="575" y="574" width="132" height="30" rx="6" class="label-bg"/>
  <text x="641" y="596" text-anchor="middle" class="label small">jump into flow</text>
</svg>
